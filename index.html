<!DOCTYPE html>
<html lang="es">
<head>

    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; }

        input { width: 90px; padding: 10px; text-align: center; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        input:disabled { background: #fee; color: #d32f2f; border: 1px solid #f44336; }
        .footer-input { border-top: 1px solid #eee; margin-top: 15px; padding-top: 15px; text-align: center; }
        .result-box { background: #004A95; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-top: 20px; }
        #resultado { font-size: 45px; font-weight: bold; display: block; }
        .info-txt { font-size: 12px; color: #777; margin-bottom: 10px; text-align: center; }
    </style>
</head>
