<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghenova HVAC</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f9; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { color: #004A95; margin: 0; font-size: 18px; }
        select { padding: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        input { width: 90px; padding: 10px; text-align: center; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        input:disabled { background: #eee; color: #999; border: 1px dashed #bbb; }
        .result-box { background: #004A95; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-top: 20px; }
        #resultado { font-size: 48px; font-weight: bold; display: block; }
        .semana-info { text-align: center; font-size: 13px; color: #666; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h2>Ghenova HVAC</h2>
            <select id="langSelect" onchange="cambiarIdioma()">
                <option value="es">ESP 🇪🇸</option>
                <option value="en">ENG 🇬🇧</option>
            </select>
        </div>

        <div id="infoSemana" class="semana-info"></div>

        <div class="row"><label id="lbl0">Lunes</label><input type="text" id="txt0" value="08:30"></div>
        <div class="row"><label id="lbl1">Martes</label><input type="text" id="txt1" value="08:30"></div>
        <div class="row"><label id="lbl2">Miércoles</label><input type="text" id="txt2" value="08:30"></div>
        <div class="row"><label id="lbl3">Jueves</label><input type="text" id="txt3" value="08:30"></div>

        <div style="border-top: 1px solid #eee; margin: 15px 0; padding-top: 15px; text-align: center;">
            <label id="lblEntrada" style="color: #004A95; font-weight: bold; display: block; margin-bottom: 5px;">Entrada Viernes</label>
            <input type="text" id="txtEntradaFinal" value="06:30">
        </div>

        <div class="result-box">
            <div id="lblSalida" style="font-size: 14px; opacity: 0.9;">HORA DE SALIDA ESTIMADA</div>
            <span id="resultado">--:--</span>
        </div>
    </div>

    <script>
        const festivos = ["2026-01-01", "2026-01-06", "2026-03-19", "2026-04-02", "2026-04-03", "2026-05-01", "2026-12-25"];
        
        const textos = {
            es: { days: ["Lunes", "Martes", "Miércoles", "Jueves"], entrada: "Entrada Viernes", salida: "HORA DE SALIDA ESTIMADA", semana: "Semana del " },
            en: { days: ["Monday", "Tuesday", "Wednesday", "Thursday"], entrada: "Friday Arrival", salida: "ESTIMATED DEPARTURE TIME", semana: "Week of " }
        };

        function cambiarIdioma() {
            const lang = document.getElementById('langSelect').value;
            for(let i=0; i<4; i++) document.getElementById('lbl'+i).innerText = textos[lang].days[i];
            document.getElementById('lblEntrada').innerText = textos[lang].entrada;
            document.getElementById('lblSalida').innerText = textos[lang].salida;
            actualizarInfoSemana(lang);
        }

        function getLunesActual() {
            let d = new Date();
            let day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function actualizarInfoSemana(lang) {
            const lunes = getLunesActual();
            document.getElementById('infoSemana').innerText = textos[lang].semana + lunes.toLocaleDateString();
        }

        function toMin(s) {
            const p = s.split(':');
            return (parseInt(p[0]) * 60) + (p[1] ? parseInt(p[1]) : 0);
        }

        function calcular() {
            const lunes = getLunesActual();
            let objetivoMin = 41 * 60;
            let acumuladoMin = 0;

            for (let i = 0; i < 4; i++) {
                let f = new Date(lunes); f.setDate(lunes.getDate() + i);
                let iso = f.toISOString().split('T')[0];
                let input = document.getElementById('txt' + i);
                if (festivos.includes(iso)) {
                    input.value = "00:00"; input.disabled = true;
                    objetivoMin -= 510;
                } else {
                    acumuladoMin += toMin(input.value);
                }
            }

            let v = new Date(lunes); v.setDate(lunes.getDate() + 4);
            if (festivos.includes(v.toISOString().split('T')[0])) objetivoMin -= 420;

            const totalMin = toMin(document.getElementById('txtEntradaFinal').value) + (objetivoMin - acumuladoMin);
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            document.getElementById('resultado').innerText = (h < 0 ? "00" : h).toString().padStart(2, '0') + ":" + Math.abs(m).toString().padStart(2, '0');
        }

        document.querySelectorAll('input').forEach(inp => inp.onkeyup = calcular);
        window.onload = () => { cambiarIdioma(); calcular(); };
    </script>
</body>
</html>
