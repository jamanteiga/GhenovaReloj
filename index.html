<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ghenova HVAC - PWA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <img src="logo_ghenova.png" alt="Logo">
                <h1>Ghenova HVAC</h1>
            </div>
        </header>

        <main>
            <div class="selector-idioma">
                <select id="pickerIdioma">
                    <option>ES</option>
                    <option>GL</option>
                    <option>EN</option>
                </select>
            </div>

            <div id="lblSemana" class="semana-label">Semana del 30/03/2026</div>

            <div class="grid-dias">
                <div class="dia-row">
                    <label>Lunes</label>
                    <input type="text" value="08:30" inputmode="numeric">
                </div>
                </div>

            <div class="entrada-final">
                <label>Entrada Viernes</label>
                <input type="text" value="06:30" inputmode="numeric">
            </div>

            <div class="resultado-panel">
                <p id="lblDiaSalida">SALIDA VIERNES 03/04</p>
                <h2 id="lblResultado">14:15</h2>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
