<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghenova HVAC</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f9; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #004A95; text-align: center; margin-top: 0; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        input { width: 90px; padding: 10px; text-align: center; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; -webkit-appearance: none; }
        input:disabled { background: #eee; color: #999; border: 1px dashed #bbb; }
        .result-box { background: #004A95; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-top: 20px; }
        #resultado { font-size: 48px; font-weight: bold; display: block; margin-top: 5px; }
        .semana-info { text-align: center; font-size: 14px; color: #666; margin-bottom: 15px; font-weight: bold; }
        label { font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Ghenova HVAC</h2>
        <div id="infoSemana" class="semana-info">Cargando semana...</div>

        <div class="row"><label>Lunes</label><input type="text" id="txt0" value="08:30"></div>
        <div class="row"><label>Martes</label><input type="text" id="txt1" value="08:30"></div>
        <div class="row"><label>Miércoles</label><input type="text" id="txt2" value="08:30"></div>
        <div class="row"><label>Jueves</label><input type="text" id="txt3" value="08:30"></div>

        <div style="border-top: 1px solid #eee; margin: 15px 0; padding-top: 15px;">
            <div style="text-align: center; color: #004A95; font-weight: bold; margin-bottom: 8px;">Entrada Salida (Hoy/Viernes)</div>
            <div style="text-align: center;"><input type="text" id="txtEntradaFinal" value="06:30"></div>
        </div>

        <div class="result-box">
            <div id="lblDiaSalida" style="font-size: 14px; opacity: 0.9;">HORA DE SALIDA ESTIMADA</div>
            <span id="resultado">--:--</span>
        </div>
    </div>

    <script>
        // Listado de festivos 2026 (Formato YYYY-MM-DD)
        const festivos = ["2026-01-01", "2026-01-06", "2026-03-19", "2026-04-02", "2026-04-03", "2026-05-01", "2026-12-25"];

        function getLunesActual() {
            let d = new Date();
            let day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function toMin(s) {
            if(!s || !s.includes(':')) return 0;
            const p = s.split(':');
            return (parseInt(p[0]) * 60) + parseInt(p[1]);
        }

        function calcular() {
            const lunes = getLunesActual();
            let objetivoMin = 41 * 60;
            let acumuladoMin = 0;

            // Revisar Lunes a Jueves (indices 0 a 3)
            for (let i = 0; i < 4; i++) {
                let fechaCotejo = new Date(lunes);
                fechaCotejo.setDate(lunes.getDate() + i);
                let iso = fechaCotejo.toISOString().split('T')[0];
                let input = document.getElementById('txt' + i);

                if (festivos.includes(iso)) {
                    input.value = "00:00";
                    input.disabled = true;
                    objetivoMin -= 510; // Restamos 8.5h del objetivo
                } else {
                    acumuladoMin += toMin(input.value);
                }
            }

            // Revisar si el VIERNES es festivo
            let viernes = new Date(lunes);
            viernes.setDate(lunes.getDate() + 4);
            if (festivos.includes(viernes.toISOString().split('T')[0])) {
                objetivoMin -= 420; // Restamos 7h del objetivo
            }

            const faltaMin = objetivoMin - acumuladoMin;
            const entradaMin = toMin(document.getElementById('txtEntradaFinal').value);
            const totalMin = entradaMin + faltaMin;

            if (isNaN(totalMin)) return;

            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            document.getElementById('resultado').innerText = 
                (h < 0 ? "00" : h).toString().padStart(2, '0') + ":" + 
                Math.abs(m).toString().padStart(2, '0');
        }

        // Inicialización
        const lunes = getLunesActual();
        document.getElementById('infoSemana').innerText = "Semana del " + lunes.toLocaleDateString();
        
        // Listeners para calcular en tiempo real
        document.querySelectorAll('input').forEach(inp => {
            inp.addEventListener('keyup', calcular);
            inp.addEventListener('change', calcular);
        });

        window.onload = calcular;
    </script>
</body>
</html>
