<html lang="es">

        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }

        h2 { color: #004A95; margin: 0; font-size: 20px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        input { width: 80px; padding: 8px; text-align: center; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        input:disabled { background: #f0f0f0; color: #999; border: 1px dashed #ccc; }
        .result-box { background: #004A95; color: white; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; }

</head>

    <div class="header">
        <div class="logo-placeholder"></div>
        <h2>Ghenova HVAC</h2>
    </div>

    <div id="infoSemana" class="semana-info"></div>

    <div id="formulario">
        <div class="row"><span>Lunes</span><input type="text" id="txtLunes" value="08:30"></div>
        <div class="row"><span>Martes</span><input type="text" id="txtMartes" value="08:30"></div>
        <div class="row"><span>Miércoles</span><input type="text" id="txtMiercoles" value="08:30"></div>
        <div class="row"><span>Jueves</span><input type="text" id="txtJueves" value="08:30"></div>
        <div style="text-align: center; margin: 20px 0;">
            <div id="lblEntradaViernes" style="font-weight: bold; color:#004A95; margin-bottom:5px">Entrada Viernes</div>
            <input type="text" id="txtEntradaFinal" value="06:30">
        </div>
    </div>

    <div class="result-box">
        <div id="lblDiaSalida">SALIDA VIERNES</div>

    </div>

        function init() {
            const hoy = new Date();
            const day = hoy.getDay();
            const diff = hoy.getDate() - day + (day === 0 ? -6 : 1);
            const lunes = new Date(hoy.setDate(diff));
            
            document.getElementById('infoSemana').innerText = "Semana del " + lunes.toLocaleDateString();

            const ids = ['txtLunes', 'txtMartes', 'txtMiercoles', 'txtJueves'];
            ids.forEach((id, index) => {
                const fecha = new Date(lunes);
                fecha.setDate(lunes.getDate() + index);
                const iso = fecha.toISOString().split('T')[0];
                const el = document.getElementById(id);
                if (festivos.includes(iso)) {
                    el.value = "00:00";
                    el.disabled = true;
                }
                el.addEventListener('input', calcular);
            });
            document.getElementById('txtEntradaFinal').addEventListener('input', calcular);
            calcular();
        }
